{% extends "base.html" %}

{% block content %}
<div class="post">
    <header class="post-header">
        <h1>{% if page.title %}{{ page.title }}{% else %}{{ section.title }}{% endif %}</h1>
    </header>

    {% if page.content %}{{ page.content | safe }}{% else %}{{ section.content | safe }}{% endif %}
</div>
{% endblock %}
