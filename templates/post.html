{% extends "base.html" %}

{% block content %}
<div class="post">
 <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
        Posted on {{ page.date | date(format="%B %-d, %Y") }}
        by {{ config.extra.author }}
    </p>
 </header>

    {{ page.content | safe }}

    {% include "comments.html" %}
</div>
{% endblock %}
